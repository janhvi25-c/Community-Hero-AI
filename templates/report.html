<!DOCTYPE html>
<html>

<head>
    <title>Community Hero AI - Report Issue</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f7fb;
        }

        .container{
            width:500px;
            margin:50px auto;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 8px 25px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#0d6efd;
            margin-bottom:5px;
        }

        h2{
            text-align:center;
            color:#555;
            margin-bottom:30px;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:8px;
            margin-top:18px;
            color:#333;
        }

        input[type=text]{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            box-sizing:border-box;
        }

        textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            height:140px;
            resize:none;
            box-sizing:border-box;
        }

        input[type=file]{
            margin-top:10px;
        }

        button{
            width:100%;
            padding:14px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:8px;
            font-size:17px;
            cursor:pointer;
            margin-top:25px;
        }

        button:hover{
            background:#0b5ed7;
        }

        .back{
            display:inline-block;
            text-decoration:none;
            background:#28a745;
            color:white;
            padding:10px 18px;
            border-radius:8px;
            margin-bottom:25px;
        }

        .back:hover{
            background:#218838;
        }

    </style>

</head>

<body>

<div class="container">

<a href="/dashboard" class="back">← Back to Dashboard</a>

<h1>🌍 Community Hero AI</h1>

<h2>Report an Issue</h2>

<form action="/upload" method="POST" enctype="multipart/form-data">

<label>📝 Issue Title</label>
<input type="text" name="title" placeholder="Enter issue title" required>

<label>📍 Location</label>
<input type="text" name="location" placeholder="Enter location" required>

<label>📄 Description</label>
<textarea name="description" placeholder="Describe the issue..." required></textarea>

<label>📷 Upload Image</label>
<input type="file" name="image" required>

<button type="submit">
🚀 Submit Report
</button>

</form>

</div>

</body>

</html>
