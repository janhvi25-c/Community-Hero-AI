<!DOCTYPE html>
<html>
<head>
    <title>Community Hero AI - Sign Up</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#0d6efd,#4facfe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .signup-box{
            background:white;
            width:400px;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
            text-align:center;
        }

        h1{
            color:#0d6efd;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:8px;
            font-size:17px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#0b5ed7;
        }

        a{
            color:#0d6efd;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="signup-box">

    <h1>🌍 Community Hero AI</h1>

    <p>Create your account</p>

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Full Name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">Create Account</button>

    </form>

    <br>

    <p>
        Already have an account?
        <a href="/login">Login</a>
    </p>

</div>

</body>
</html>
